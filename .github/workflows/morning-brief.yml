name: Morning Brief

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Omni Morning Brief
        env:
          OMNI_API_KEY: ${{ secrets.OMNI_API_KEY }}
        run: |
          set +e
          curl -v -X POST "https://omnitunnel.numbersprotocol.io/api/external/conversations/e3e0b03e-62c0-4adb-891d-f21402cdc3d7/run" -H "X-API-Key: ${OMNI_API_KEY}" -H "Content-Type: application/json" -d '{"content":"morning brief"}'
          echo "EXIT_CODE=$?"
