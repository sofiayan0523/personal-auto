name: Morning Brief

on:
  schedule:
    # 08:00 Taipei (UTC+8) = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允許手動觸發（測試用）

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Omni Morning Brief
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://****/api/external/conversations/e3e0b03e-62c0-4adb-891d-f21402cdc3d7/run" \
            -H "X-API-Key: ${{ secrets.OMNI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"content": "morning brief"}')
          echo "Response: $RESPONSE"
          STATUS=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))")
          echo "Task status: $STATUS"
